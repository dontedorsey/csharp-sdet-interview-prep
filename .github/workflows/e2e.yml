name: E2E

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:        # manual trigger

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore and build
        run: dotnet restore && dotnet build --configuration Release

      - name: Install Playwright browsers
        run: pwsh tests/E2ETests/bin/Release/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: |
          dotnet test tests/E2ETests \
            --no-build --configuration Release \
            --logger trx \
            --results-directory TestResults/E2E \
            --filter "Category=E2E"
        env:
          CI: true
          TEST_BASE_URL:  ${{ secrets.STAGING_BASE_URL }}
          TEST_EMAIL:     ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD:  ${{ secrets.TEST_PASSWORD }}

      - name: Upload E2E results and traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            TestResults/E2E/*.trx
            playwright-traces/

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Results
          path: TestResults/E2E/*.trx
          reporter: dotnet-trx
